services:
  # ── Production preview (built image) ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: dh-agentur-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_SITE_URL=http://localhost:3000
    restart: unless-stopped

  # ── Development with hot-reload ──────────────────────────────────────────────
  dev:
    image: node:22-alpine
    container_name: dh-agentur-dev
    working_dir: /app
    ports:
      - '3001:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    profiles:
      - dev
