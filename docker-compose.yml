###############################################################################
# Production split: backend on home server, frontend separate instance.
#
# Usage:
#   docker compose up -d          ← starts both backend + frontend
#   docker compose up backend -d  ← backend only
#
# Environment:
#   Copy .env.example → .env and fill in the values before first run.
###############################################################################

services:

  # ── Backend (admin panel + public API + content management) ─────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IS_BACKEND: "true"
        NUXT_PUBLIC_SITE_URL: ${BACKEND_URL:-http://localhost:3001}
        NUXT_PUBLIC_BACKEND_URL: ""   # backend reads files directly, no API hop needed
    container_name: dh-backend
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NUXT_PORT: "3000"
      IS_BACKEND: "true"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dh-agentur.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      NUXT_PUBLIC_SITE_URL: ${BACKEND_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-*}   # CORS allow-origin for /api/public/*
    volumes:
      - content:/app/content           # markdown files (shared with frontend)
      - uploads:/app/public/uploads    # uploaded images
      - db:/app/data                   # SQLite database
    restart: unless-stopped

  # ── Frontend (public website, reads content via backend API) ─────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IS_BACKEND: "false"
        NUXT_PUBLIC_SITE_URL: ${FRONTEND_URL:-http://localhost:3000}
        NUXT_PUBLIC_BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
    container_name: dh-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NUXT_PORT: "3000"
      IS_BACKEND: "false"
      NUXT_PUBLIC_SITE_URL: ${FRONTEND_URL:-http://localhost:3000}
      NUXT_PUBLIC_BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  content:
  uploads:
  db:
